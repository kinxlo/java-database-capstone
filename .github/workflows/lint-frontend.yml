name: Lint Frontend

on:
  push:
  pull_request:

jobs:
  lint-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend linters
        run: |
          npm install -g htmlhint stylelint eslint

      - name: Lint HTML
        run: |
          htmlhint "app/src/main/resources/static/assets/pages/**/*.html" || true
          htmlhint "app/src/main/resources/static/pages/**/*.html" || true

      - name: Lint CSS
        run: |
          stylelint "app/src/main/resources/static/assets/css/**/*.css" || true

      - name: Lint JavaScript
        run: |
          eslint "app/src/main/resources/static/assets/js/**/*.js" || true
          eslint "app/src/main/resources/static/js/**/*.js" || true

