name: Compile Backend

on:
  push:
  pull_request:

jobs:
  compile-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Compile with Maven
        working-directory: app
        run: |
          mvn clean compile

