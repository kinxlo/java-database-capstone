<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic CMS - Select Role</title>
    <link rel="icon" type="image/png" href="./assets/images/logo/logo.png">
    <link rel="stylesheet" href="./assets/css/index.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <script src="./js/util.js" defer></script>
    <script src="./js/render.js" defer></script>
    <script src="./js/components/header.js" defer></script>
    <script src="./js/components/footer.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="wrapper">
            <div id="header"></div>

            <main class="main-content" id="roleSelectionMain">
                <h2 id="roleSelectionTitle">Select Your Role</h2>
                <button id="adminRoleBtn" class="dashboard-btn" onclick="handleRoleSelection('admin')">Admin</button>
                <button id="doctorRoleBtn" class="dashboard-btn" onclick="handleRoleSelection('doctor')">Doctor</button>
                <button id="patientRoleBtn" class="dashboard-btn" onclick="handleRoleSelection('patient')">Patient</button>
            </main>

            <div id="footer"></div>
        </div>
    </div>

    <div id="modal" class="modal" aria-hidden="true">
        <div class="modal-content">
            <button id="closeModal" class="close" type="button" aria-label="Close modal">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <script type="module" src="./js/services/index.js" defer></script>
    <script type="module">
        import { openModal } from "./js/components/modals.js";

        window.handleRoleSelection = function handleRoleSelection(role) {
            localStorage.setItem("userRole", role);

            if (role === "patient") {
                window.location.href = "/pages/patientDashboard.html";
                return;
            }

            openModal(role === "admin" ? "adminLogin" : "doctorLogin");
        };
    </script>
</body>
</html>
